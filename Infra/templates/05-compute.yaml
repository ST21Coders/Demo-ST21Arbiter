AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  ARBITER – Compute (DEMO trim): ECR repos for master + zscaler specialist
  (the other 2 specialists' repos live in 09-agentcore.yaml). Plus the
  processing_pipeline Lambda (S3 raw → text extract → KB sync).
  Dropped: ECR repos for unused agents (doc-specialist, net-specialist,
  iam-specialist, conflict-reasoner, remediation-planner). The agents/
  directory only has 4 real agents — keep their repos and nothing else.
  Single-AZ: VpcConfig uses one private subnet.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  ProjectName:
    Type: String
    Default: st21arbiter-poc
  KbId:
    Type: String
    Default: ""
    Description: >
      Bedrock Knowledge Base ID (e.g. 2ADHACW6LB). Created out-of-band by
      scripts/setup_bedrock_kb.py; passed here so processing_pipeline can
      auto-trigger ingestion jobs after copying new files. Empty = disabled.
  KbDataSourceId:
    Type: String
    Default: ""
    Description: >
      Bedrock KB data-source ID associated with the processed bucket (e.g.
      KLUEZ1RNM5). Required alongside KbId for ingestion auto-trigger.

Globals:
  Function:
    Runtime: python3.13
    Timeout: 300
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        PROJECT_NAME: !Ref ProjectName
    VpcConfig:
      SubnetIds:
        - Fn::ImportValue: !Sub "${Environment}-${ProjectName}-PrivateSubnet1Id"
      SecurityGroupIds:
        - Fn::ImportValue: !Sub "${Environment}-${ProjectName}-LambdaSGId"

Resources:
  # ──────────────────────────── ECR Repositories (2) ───────────
  # IMMUTABLE → MUTABLE for the demo so we can re-push :latest while
  # iterating on the agents.
  MasterOrchestratorRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${Environment}-${ProjectName}/master-orchestrator"
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: KMS
        KmsKey:
          Fn::ImportValue: !Sub "${Environment}-${ProjectName}-DataAtRestKeyArn"
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {"rulePriority":1,"description":"Keep last 5 images",
               "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
               "action":{"type":"expire"}}
            ]
          }
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-master-orchestrator"

  ZscalerSpecialistRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${Environment}-${ProjectName}/zscaler-specialist"
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: KMS
        KmsKey:
          Fn::ImportValue: !Sub "${Environment}-${ProjectName}-DataAtRestKeyArn"
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {"rulePriority":1,"description":"Keep last 5 images",
               "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
               "action":{"type":"expire"}}
            ]
          }
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-zscaler-specialist"

  # ──────────────────────────── Processing Pipeline Lambda ─────
  ProcessingPipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-${ProjectName}-processing-pipeline"
      Handler: processing_pipeline.handler
      CodeUri: ../functions/processing_pipeline/
      Role:
        Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ProcessingPipelineRoleArn"
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          RAW_BUCKET:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-RawBucketName"
          PROCESSED_BUCKET:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ProcessedBucketName"
          S3_KMS_KEY_ARN:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-S3KeyArn"
          REPORTS_PREFIX: "File_Transfer_Reports/"
          # Used by the JWT decode in processing_pipeline._caller_groups.
          COGNITO_ISSUER_URL:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-CognitoIssuerURL"
          # Comma-separated Cognito group list allowed to trigger a manual run.
          # EventBridge invocations bypass this gate (no http context on the event).
          ALLOWED_GROUPS: "ciso,grc"
          # F1 auto-detect chain — after processing a new file, kick a KB
          # ingestion job and then async-invoke the scanner Lambda. Empty
          # KB_ID disables the auto-trigger gracefully (Lambda just moves files).
          KB_ID: !Ref KbId
          KB_DATA_SOURCE_ID: !Ref KbDataSourceId
          # Deterministic scanner name from CFN params — no cross-stack import
          # needed; 02-security has already granted lambda:InvokeFunction on it.
          SCANNER_LAMBDA_NAME: !Sub "${Environment}-${ProjectName}-scanner"
          # Structured (.csv) uploads route to processed/structured/ and trigger
          # this Glue crawler (created in 04-storage). Deterministic name.
          GLUE_CRAWLER_NAME: !Sub "${Environment}-${ProjectName}-structured-crawler"
      # Function URL for manual UI-driven triggers. AuthType=NONE; the Lambda
      # decodes the Cognito IdToken from the Authorization header and verifies
      # the caller's group membership against ALLOWED_GROUPS. Mirrors the
      # api_handler /chat pattern.
      FunctionUrlConfig:
        AuthType: NONE
      Tags:
        Name: !Sub "${Environment}-${ProjectName}-processing-pipeline"

  ProcessingPipelinePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessingPipelineFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${Environment}-${ProjectName}-raw"
      SourceAccount: !Ref AWS::AccountId

  # ──────────────────────────── Schedule (twice/day) ───────────
  # Cron is UTC. 14:00 UTC = 06:00 PST and 02:00 UTC = 18:00 PST (UTC-8 literal,
  # not DST-aware). Switch to AWS::Scheduler::Schedule with
  # ScheduleExpressionTimezone if Pacific-local wall-clock is wanted instead.
  ProcessingPipelineSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Environment}-${ProjectName}-processing-pipeline-schedule"
      Description: "Twice-daily raw -> processed file move (06:00 / 18:00 PST literal UTC-8)"
      ScheduleExpression: "cron(0 14,2 * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt ProcessingPipelineFunction.Arn
          Id: ProcessingPipelineTarget

  ProcessingPipelineSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessingPipelineFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ProcessingPipelineSchedule.Arn

  # ──────────────────────────── F1: S3 ObjectCreated → processing_pipeline ─────
  # The raw bucket emits ObjectCreated events to the default EventBridge bus
  # (RawBucket.NotificationConfiguration in 04-storage). This rule filters those
  # events down to "real" uploads (excluding our own CSV reports under
  # File_Transfer_Reports/) and invokes processing_pipeline with a single-event
  # payload. The Lambda branches on event source: cron → batch sweep, S3 →
  # single-object move + ingestion-job + scanner invoke.
  RawBucketObjectCreatedRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Environment}-${ProjectName}-raw-object-created"
      Description: "Auto-detect: every new doc in raw bucket triggers processing_pipeline"
      State: ENABLED
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Sub "${Environment}-${ProjectName}-raw"
          object:
            key:
              - anything-but:
                  prefix: "File_Transfer_Reports/"
      Targets:
        - Arn: !GetAtt ProcessingPipelineFunction.Arn
          Id: ProcessingPipelineObjectCreatedTarget

  RawBucketObjectCreatedRulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessingPipelineFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt RawBucketObjectCreatedRule.Arn

  ProcessingPipelineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${ProjectName}-processing-pipeline"
      RetentionInDays: 30

  # ──────────────────────────── Audit subscriber Lambda ───────────
  # Receives Cognito failed-sign-in CloudTrail events via EventBridge and
  # writes one AUTH_FAILED row to the audit-log table per match. Best-effort:
  # any DDB error is logged at WARNING and the handler still returns 200 so
  # EventBridge does not retry on transient throttles.
  #
  # VpcConfig is explicitly overridden with empty lists because the global
  # default puts every function in PrivateSubnet1 — but this Lambda only calls
  # DynamoDB + KMS over public endpoints and pays no Bedrock-related cold-start
  # cost, so attaching an ENI is pure overhead. Reviewers: do not "fix" this
  # back to inherit the global VpcConfig.
  AuditCognitoSubscriberFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-${ProjectName}-audit-cognito-subscriber"
      Handler: handler.handler
      CodeUri: ../functions/audit_cognito_subscriber/
      Role:
        Fn::ImportValue: !Sub "${Environment}-${ProjectName}-AuditCognitoSubscriberRoleArn"
      Timeout: 10
      MemorySize: 256
      # Inherits Globals.Function.VpcConfig (PrivateSubnet1 + LambdaSG). An
      # empty-array override here does NOT cleanly disable VPC (CFN treats it
      # as "VPC attached, but empty"), so we let the global apply and grant
      # AWSLambdaVPCAccessExecutionRole on the role in 02-security.yaml.
      # The Lambda only calls DynamoDB and CloudWatch Logs; both reachable
      # from inside the VPC.
      Environment:
        Variables:
          AUDIT_LOG_TABLE_NAME:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-AuditLogTableName"
      Tags:
        Name: !Sub "${Environment}-${ProjectName}-audit-cognito-subscriber"

  # Filters CloudTrail's Cognito API calls to failed sign-ins on the dev pool.
  #
  # We scope by clientId, NOT userPoolId. Cognito's public InitiateAuth events
  # (the brute-force vector) carry only clientId in requestParameters; only
  # AdminInitiateAuth carries userPoolId. Filtering by userPoolId would silently
  # ignore every real failed sign-in from the browser path. (Verified live
  # against CloudTrail: requestParameters = {authFlow, authParameters, clientId}.)
  # Each Cognito app client is unique to one pool, so clientId is still narrowly
  # scoped to the dev pool.
  AuditCognitoSubscriberRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Environment}-${ProjectName}-cognito-auth-failed"
      Description: "Failed Cognito sign-ins on the dev pool → audit subscriber"
      State: ENABLED
      EventPattern:
        source:
          - aws.cognito-idp
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          errorCode:
            - NotAuthorizedException
            - UserNotFoundException
            - UserNotConfirmedException
            - PasswordResetRequiredException
          requestParameters:
            clientId:
              - Fn::ImportValue: !Sub "${Environment}-${ProjectName}-UserPoolClientId"
      Targets:
        - Arn: !GetAtt AuditCognitoSubscriberFunction.Arn
          Id: AuditCognitoSubscriber

  AuditCognitoSubscriberPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuditCognitoSubscriberFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AuditCognitoSubscriberRule.Arn

  AuditCognitoSubscriberLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${ProjectName}-audit-cognito-subscriber"
      RetentionInDays: 30

Outputs:
  MasterOrchestratorRepoUri:
    Value: !GetAtt MasterOrchestratorRepo.RepositoryUri
    Export:
      Name: !Sub "${Environment}-${ProjectName}-MasterOrchestratorRepoUri"
  ZscalerSpecialistRepoUri:
    Value: !GetAtt ZscalerSpecialistRepo.RepositoryUri
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ZscalerSpecialistRepoUri"
  ProcessingPipelineLambdaArn:
    Value: !GetAtt ProcessingPipelineFunction.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ProcessingPipelineLambdaArn"
  ProcessingPipelineFunctionUrl:
    Description: Direct Function URL to trigger the file mover from a UI (AuthType=NONE; JWT decoded in code).
    Value: !GetAtt ProcessingPipelineFunctionUrl.FunctionUrl
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ProcessingPipelineFunctionUrl"

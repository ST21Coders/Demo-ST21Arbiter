AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ARBITER – Security (DEMO trim): 2 KMS CMKs (data, dynamodb) + 2 Lambda
  execution roles. Dropped: SecretsKey + S3Key (data-at-rest CMK reused
  via SSE-KMS), permission-boundary managed policy (least-privilege is
  encoded directly in each role's inline policy).

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  ProjectName:
    Type: String
    Default: st21arbiter-poc

Resources:
  # ──────────────────────────── KMS CMKs (2) ───────────────────
  DataAtRestKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${Environment}-${ProjectName} data-at-rest encryption (S3 + secrets)"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: RootAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: ServiceUsage
            Effect: Allow
            Principal:
              Service:
                - s3.amazonaws.com
                - secretsmanager.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: "*"
          - Sid: LambdaUsage
            Effect: Allow
            Principal:
              AWS:
                - !GetAtt ApiHandlerRole.Arn
                - !GetAtt ProcessingPipelineRole.Arn
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-data-at-rest-key"

  DataAtRestKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${Environment}-${ProjectName}-data-at-rest"
      TargetKeyId: !Ref DataAtRestKey

  DynamoDBKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${Environment}-${ProjectName} DynamoDB encryption"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: RootAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: DynamoDBService
            Effect: Allow
            Principal:
              Service: dynamodb.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
              - kms:CreateGrant
            Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-dynamodb-key"

  DynamoDBKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${Environment}-${ProjectName}-dynamodb"
      TargetKeyId: !Ref DynamoDBKey

  # ──────────────────────────── Lambda Execution Roles ─────────
  # api_handler: signed by API Gateway → calls AgentCore + reads/writes
  # DynamoDB tables for findings/actions/audit.
  ApiHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ProjectName}-api-handler-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: ApiHandlerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AgentCoreInvoke
                Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntime
                  - bedrock-agentcore:ListEvents
                  - bedrock-agentcore:GetEvent
                  # Read-only runtime status for GET /agent-status (MCP page).
                  - bedrock-agentcore:ListAgentRuntimes
                  - bedrock-agentcore:GetAgentRuntime
                  - bedrock:InvokeModel
                  - bedrock:Retrieve
                  - bedrock:ApplyGuardrail
                Resource: "*"
              - Sid: DDBReadWrite
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                # Both the table ARN and the /index/* ARN are needed: DynamoDB
                # requires explicit GSI-level permission for Query on an index.
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${Environment}-${ProjectName}-*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${Environment}-${ProjectName}-*/index/*"
              - Sid: KMSUsage
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:DescribeKey
                Resource: "*"
              - Sid: SecretsRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Environment}/${ProjectName}/*"
              # Needed for /uploads/presign and /uploads/list. PutObject must
              # be allowed on the role so the presigned URL the role signs is
              # actually usable; the URL itself enforces the key prefix and
              # KMS settings, but IAM still has to permit the action.
              - Sid: RawProcessedBucketUploads
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${Environment}-${ProjectName}-raw"
                  - !Sub "arn:aws:s3:::${Environment}-${ProjectName}-raw/*"
                  - !Sub "arn:aws:s3:::${Environment}-${ProjectName}-processed"
                  - !Sub "arn:aws:s3:::${Environment}-${ProjectName}-processed/*"
              # Data Grouping materializes project folders and starts the same
              # structured crawler used by the processing pipeline.
              - Sid: DataGroupingCrawlerStart
                Effect: Allow
                Action:
                  - glue:StartCrawler
                  - glue:GetCrawler
                Resource:
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:crawler/${Environment}-${ProjectName}-structured-crawler"
              # Config Drift reads current security group state for baseline and
              # drift comparison. The first remediation POC is deliberately
              # allowlisted to the one security group used in manual testing.
              - Sid: ConfigDriftReadSecurityGroups
                Effect: Allow
                Action:
                  - ec2:DescribeSecurityGroups
                Resource: "*"
              - Sid: ConfigDriftRevertAllowlistedSecurityGroup
                Effect: Allow
                Action:
                  - ec2:RevokeSecurityGroupIngress
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/sg-0ff2704a0e3189977"
              # Synchronous report generation: api_handler PUTs generated reports
              # into the reports bucket (SSE-S3, no KMS) and signs presigned GET
              # URLs the browser downloads. GetObject must be allowed on the role
              # so the presigned download URL it signs is usable.
              - Sid: ReportsBucketReadWrite
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${Environment}-${ProjectName}-reports/*"
              # POST /scan async-invokes the scanner Lambda. The Lambda is
              # deployed in 11-scanner.yaml; scoping by name prefix avoids a
              # circular dependency between 02-security and 11-scanner.
              - Sid: ScannerLambdaInvoke
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Environment}-${ProjectName}-scanner"
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-api-handler-role"

  # audit_cognito_subscriber: EventBridge target for failed Cognito sign-ins.
  # Narrowly scoped: PutItem on the audit-log table ARN only, KMS use on the
  # DynamoDB CMK only. Reusing ApiHandlerRole would silently widen the blast
  # radius — this Lambda has one job and one resource.
  AuditCognitoSubscriberRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ProjectName}-audit-cognito-subscriber-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        # 05-compute.yaml's Globals.Function.VpcConfig attaches this Lambda to
        # PrivateSubnet1 + LambdaSG like every other function in the stack. ENI
        # creation needs ec2:CreateNetworkInterface etc., which only the AWS
        # managed VPC-access policy provides. Empty-array VpcConfig overrides
        # at the function level do NOT cleanly disable VPC, so we attach this
        # rather than fight the Globals (CFN stack failure 2026-06-15 17:32).
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: AuditCognitoSubscriberInline
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AuditLogPutItem
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${Environment}-${ProjectName}-audit-log"
              # The audit-log table is CMK-encrypted via DynamoDBKey. Without
              # GenerateDataKey on that CMK, PutItem silently fails — same
              # gotcha documented in CLAUDE.local.md for the AgentCore role.
              - Sid: AuditCmkUse
                Effect: Allow
                Action:
                  - kms:GenerateDataKey
                  - kms:Decrypt
                Resource:
                  - !GetAtt DynamoDBKey.Arn
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-audit-cognito-subscriber-role"

  # processing_pipeline: S3 → Textract/parse → KB ingestion
  ProcessingPipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ProjectName}-processing-pipeline-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: ProcessingPipelinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${Environment}-${ProjectName}-raw"
                  - !Sub "arn:aws:s3:::${Environment}-${ProjectName}-raw/*"
                  - !Sub "arn:aws:s3:::${Environment}-${ProjectName}-processed"
                  - !Sub "arn:aws:s3:::${Environment}-${ProjectName}-processed/*"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:DescribeKey
                Resource: "*"
              - Sid: BedrockKnowledgeBaseIngest
                Effect: Allow
                Action:
                  # IAM action prefix is `bedrock:` even though the boto3
                  # client is `bedrock-agent`. AWS surfaces the action as
                  # bedrock:StartIngestionJob in AccessDenied messages.
                  - bedrock:StartIngestionJob
                  - bedrock:GetIngestionJob
                  - bedrock:ListIngestionJobs
                Resource: "*"
              # F1 auto-detect chain: after copying a new doc to processed,
              # processing_pipeline starts a KB ingestion job and async-invokes
              # the scanner Lambda. Scoped to the deterministic scanner name.
              - Sid: ScannerLambdaInvoke
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Environment}-${ProjectName}-scanner"
              # Structured (.csv) uploads trigger the Glue crawler that catalogues
              # them for Athena. Scoped to the one structured crawler.
              - Sid: StructuredCrawlerStart
                Effect: Allow
                Action:
                  - glue:StartCrawler
                  - glue:GetCrawler
                Resource:
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:crawler/${Environment}-${ProjectName}-structured-crawler"
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-processing-pipeline-role"

Outputs:
  DataAtRestKeyArn:
    Value: !GetAtt DataAtRestKey.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-DataAtRestKeyArn"
  # Re-exported under legacy names so dependent stacks (04-storage, 03-identity)
  # don't need to be updated.
  SecretsKeyArn:
    Value: !GetAtt DataAtRestKey.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-SecretsKeyArn"
  S3KeyArn:
    Value: !GetAtt DataAtRestKey.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-S3KeyArn"
  DynamoDBKeyArn:
    Value: !GetAtt DynamoDBKey.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-DynamoDBKeyArn"
  ApiHandlerRoleArn:
    Value: !GetAtt ApiHandlerRole.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ApiHandlerRoleArn"
  ProcessingPipelineRoleArn:
    Value: !GetAtt ProcessingPipelineRole.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ProcessingPipelineRoleArn"
  AuditCognitoSubscriberRoleArn:
    Value: !GetAtt AuditCognitoSubscriberRole.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-AuditCognitoSubscriberRoleArn"

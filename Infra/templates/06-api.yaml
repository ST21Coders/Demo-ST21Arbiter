AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  ARBITER – API Plane (DEMO trim): API Gateway REST + Cognito JWT
  authorizer + api_handler Lambda. Routes match exactly what the React UI
  calls in ui/src/hooks/useApi.js and ui/src/pages/MCPChat.jsx.
  Dropped: WAFv2 (Cognito JWT remains the gate); rate-limit kept via
  API Gateway throttle settings.
  Wire-up: browser → CloudFront → React SPA → fetch(API_URL + path,
  headers={Authorization: Bearer <Cognito IdToken>}) → API Gateway
  (Cognito authorizer validates JWT) → api_handler Lambda → AgentCore /
  DynamoDB / Bedrock.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  ProjectName:
    Type: String
    Default: st21arbiter-poc
  ThrottleRateLimit:
    Type: Number
    Default: 50
    Description: API Gateway requests per second (demo).
  ThrottleBurstLimit:
    Type: Number
    Default: 100
    Description: API Gateway burst capacity (demo).
  AllowedOrigin:
    Type: String
    Default: "*"
    Description: CORS Access-Control-Allow-Origin. For prod, set to the CloudFront domain.
  ChatFunctionUrlAllowedOrigins:
    Type: CommaDelimitedList
    Default: "http://localhost:5173"
    Description: |
      CORS allow-list for the /chat Lambda Function URL. Set to the Vite dev origin
      plus the CloudFront SPA URL (e.g. "http://localhost:5173,https://dxxxx.cloudfront.net").
      Function URL CORS is not the same as API Gateway CORS — it has its own allow-list.

Globals:
  Function:
    Runtime: python3.13
    Tracing: Active
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        PROJECT_NAME: !Ref ProjectName

Resources:
  # ──────────────────────────── API Gateway Account Config ─────
  # AWS::ApiGateway::Account is a singleton per account/region. Without a
  # CloudWatch Logs role configured here, any stage with LoggingLevel or
  # AccessLogSetting fails with "CloudWatch Logs role ARN must be set".
  # Note: deleting this stack resets the account-level setting; that's
  # acceptable for the demo since this is the only API Gateway in-region.
  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ProjectName}-apigw-cwlogs-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-apigw-cwlogs-role"

  ApiGatewayAccountConfig:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  # ──────────────────────────── API Gateway (REST) ─────────────
  # Cognito User-Pool authorizer is the DEFAULT — every route requires
  # a valid Bearer IdToken. /health is the only public route (overrides
  # auth in the function event below).
  ArbiterApi:
    Type: AWS::Serverless::Api
    DependsOn: ApiGatewayAccountConfig
    Properties:
      Name: !Sub "${Environment}-${ProjectName}-api"
      StageName: !Ref Environment
      TracingEnabled: true
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: !Sub "'${AllowedOrigin}'"
        MaxAge: "'600'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn:
              Fn::ImportValue: !Sub "${Environment}-${ProjectName}-UserPoolArn"
            Identity:
              Header: Authorization
      EndpointConfiguration:
        Type: REGIONAL
      MethodSettings:
        - HttpMethod: "*"
          ResourcePath: "/*"
          ThrottlingRateLimit: !Ref ThrottleRateLimit
          ThrottlingBurstLimit: !Ref ThrottleBurstLimit
          LoggingLevel: INFO
          DataTraceEnabled: false
          MetricsEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","user":"$context.authorizer.claims.email","time":"$context.requestTime","method":"$context.httpMethod","path":"$context.resourcePath","status":"$context.status","latency":"$context.integrationLatency"}'
      Tags:
        Name: !Sub "${Environment}-${ProjectName}-api"

  # ──────────────────────────── API Handler Lambda ─────────────
  # Routes mapped 1:1 to UI calls in useApi.js + MCPChat.jsx:
  #   POST /scan                          (Dashboard "Run Scan")
  #   GET  /findings                      (Dashboard, Findings, HeatMap, Governance)
  #   GET  /findings/{id}                 (Finding detail drill-down)
  #   GET  /actions                       (ActionCenter load)
  #   POST /actions                       (ActionCenter request)
  #   POST /actions/{id}/approve|reject|execute|escalate  (ActionCenter)
  #   GET  /audit                         (AuditLogs)
  #   POST /chat                          (MCPChat, AnalystView)
  #   POST /mymcp/chat                    (MyMCP spoke requests)
  #   GET  /conversations                          (MCPChat + AnalystView sidebars)
  #   GET    /conversations/{session_id}           (session metadata)
  #   DELETE /conversations/{session_id}           (per-chat trash button)
  #   GET  /conversations/{session_id}/messages    (full message history from AgentCore Memory)
  #   GET  /health                                 (unauth, for CDK/SAM healthcheck)

  # ──────────────────────────── Gateway responses (CORS on 4xx) ──
  # Without these, when the Cognito authorizer rejects a request, API
  # Gateway returns 401 with NO CORS headers — the browser treats it as a
  # CORS failure and the SPA can't react (e.g., redirect to sign-in). These
  # GatewayResponses inject the CORS headers into authorizer denials so the
  # JS sees the real status code.
  Unauthorized4xxResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: UNAUTHORIZED
      RestApiId: !Ref ArbiterApi
      StatusCode: "401"
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

  AccessDenied4xxResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: ACCESS_DENIED
      RestApiId: !Ref ArbiterApi
      StatusCode: "403"
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

  Default4xxResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: DEFAULT_4XX
      RestApiId: !Ref ArbiterApi
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

  Default5xxResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: DEFAULT_5XX
      RestApiId: !Ref ArbiterApi
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"

  ApiHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-${ProjectName}-api-handler"
      Handler: api_handler.handler
      CodeUri: ../functions/api_handler/
      Role:
        Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ApiHandlerRoleArn"
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          COGNITO_USER_POOL_ID:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-UserPoolId"
          COGNITO_ISSUER_URL:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-CognitoIssuerURL"
          CONFLICTS_TABLE:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ConflictsTableName"
          AUDIT_TABLE:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-AuditLogTableName"
          SESSIONS_TABLE:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-SessionsTableName"
          CHANGE_REQUESTS_TABLE:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ChangeRequestsTableName"
          # V2 conflicts + scan-runs tables added in this revision.
          # Imports use Fn::ImportValue with a default-via-Sub fallback isn't
          # available — these exports MUST exist (04-storage already deployed
          # with v2/scan-runs by the time 06-api re-deploys).
          CONFLICTS_TABLE_V2:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ConflictsTableV2Name"
          SCAN_RUNS_TABLE:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ScanRunsTableName"
          # Token Tracking (CISO-only Governance tab). Read by GET /token-usage
          # and GET /token-usage/summary in api_handler.py; written by the four
          # AgentCore Runtimes directly via boto3 (see agents/_shared/token_usage.py).
          TOKEN_USAGE_TABLE:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-TokenUsageTableName"
          GLUE_CRAWLER_NAME:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-StructuredCrawlerName"
          # Comma-separated MCP endpoint URLs for /mcp-health pings. Empty by
          # default — UI shows all MCP servers as "unknown" until configured.
          MCP_ENDPOINTS: ""
          # Deterministic name from CFN parameters — no cross-stack import needed.
          # 02-security has already granted lambda:InvokeFunction on this exact name.
          SCANNER_LAMBDA_NAME: !Sub "${Environment}-${ProjectName}-scanner"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          # Filled in by deploy_agents.py after AgentCore runtimes are up.
          MASTER_AGENT_RUNTIME_ARN: ""
          # Specialist runtime ARNs for direct per-agent chat routing from the
          # MCP page (POST /chat with a "target"). Patched by deploy_agents.py
          # alongside MASTER_AGENT_RUNTIME_ARN.
          SHAREPOINT_RUNTIME_ARN: ""
          AWSCONFIG_RUNTIME_ARN: ""
          ZSCALER_RUNTIME_ARN: ""
          PALOALTO_RUNTIME_ARN: ""
          STRUCTURED_RUNTIME_ARN: ""
          JIRA_RUNTIME_ARN: ""
          SERVICENOW_RUNTIME_ARN: ""
          # Set by deploy_agents.py alongside MASTER_AGENT_RUNTIME_ARN. Read by
          # GET /conversations/{id}/messages to list events from AgentCore Memory.
          MEMORY_ID: ""
          # Used by /uploads/presign (writes into RAW) and /uploads/list
          # (reads RAW or PROCESSED). KMS key ARN is required because both
          # buckets enforce SSE-KMS — the presigned PUT must carry the same
          # encryption headers the role agreed to in the signature.
          RAW_BUCKET:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-RawBucketName"
          PROCESSED_BUCKET:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ProcessedBucketName"
          S3_KMS_KEY_ARN:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-S3KeyArn"
          # Synchronous compliance report generation (/reports/* + /compliance/report).
          # Reports bucket is SSE-S3 (AES256), so PutObject needs no KMS header and
          # the presigned GET download works with plain s3:GetObject.
          REPORTS_BUCKET:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ReportsBucketName"
          ORG_NAME: "Meridian Insurance Group"
      VpcConfig:
        SubnetIds:
          - Fn::ImportValue: !Sub "${Environment}-${ProjectName}-PrivateSubnet1Id"
        SecurityGroupIds:
          - Fn::ImportValue: !Sub "${Environment}-${ProjectName}-LambdaSGId"
      # Function URL for long-running calls (e.g. /chat). API Gateway REST has
      # a hard 29s timeout; Function URLs allow up to 15 min. AuthType=NONE for
      # demo testing — switch to AWS_IAM (SigV4) or move logic to async before prod.
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: !Ref ChatFunctionUrlAllowedOrigins
          AllowMethods:
            - POST
            - GET
          AllowHeaders:
            - content-type
            - authorization
          MaxAge: 3600
      Events:
        ScanPost:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /scan
            Method: POST
        FindingsList:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /findings
            Method: GET
        FindingDetail:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /findings/{conflict_id}
            Method: GET
        ActionsList:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /actions
            Method: GET
        ActionsCreate:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /actions
            Method: POST
        ActionsApprove:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /actions/{cr_id}/approve
            Method: POST
        ActionsReject:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /actions/{cr_id}/reject
            Method: POST
        ActionsExecute:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /actions/{cr_id}/execute
            Method: POST
        ActionsEscalate:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /actions/{cr_id}/escalate
            Method: POST
        AuditList:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /audit
            Method: GET
        ReportsCatalogGet:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /reports/catalog
            Method: GET
        ReportsGenerate:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /reports/generate
            Method: POST
        ComplianceScoresGet:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /compliance/scores
            Method: GET
        ComplianceReportPost:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /compliance/report
            Method: POST
        TokenUsageGet:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /token-usage
            Method: GET
        TokenUsageSummaryGet:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /token-usage/summary
            Method: GET
        ChatPost:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /chat
            Method: POST
        MyMcpChatPost:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /mymcp/chat
            Method: POST
        ConversationsList:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /conversations
            Method: GET
        ConversationDetail:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /conversations/{session_id}
            Method: GET
        ConversationDelete:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /conversations/{session_id}
            Method: DELETE
        ConversationsBulkDelete:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /conversations/bulk-delete
            Method: POST
        ConversationMessages:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /conversations/{session_id}/messages
            Method: GET
        HealthCheck:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE
        # ─── NEW (added by dashboard + scanner work) ───────────
        DashboardAggregate:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /dashboard
            Method: GET
        ScanRunsList:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /scan-runs
            Method: GET
        ScanRunDetail:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /scan-runs/{scan_run_id}
            Method: GET
        McpHealth:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /mcp-health
            Method: GET
        AgentStatus:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /agent-status
            Method: GET
        JiraTicketCreate:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /jira/tickets
            Method: POST
        UploadsPresign:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /uploads/presign
            Method: POST
        UploadsList:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /uploads/list
            Method: GET
        DataGroupingMaterialize:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /data-grouping/materialize
            Method: POST
        DataGroupingStartCrawler:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /data-grouping/start-crawler
            Method: POST
        DataGroupingAnalyzeDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /data-grouping/analyze-documents
            Method: POST
        ConfigDriftSecurityGroupsCurrent:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /config-drift/security-groups/current
            Method: GET
        ConfigDriftSecurityGroupsBaseline:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /config-drift/security-groups/baseline
            Method: POST
        ConfigDriftSecurityGroupsBaselineGet:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /config-drift/security-groups/baseline
            Method: GET
        ConfigDriftSecurityGroupsCheck:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /config-drift/security-groups/check
            Method: POST
        ConfigDriftSecurityGroupsRevert:
          Type: Api
          Properties:
            RestApiId: !Ref ArbiterApi
            Path: /config-drift/security-groups/revert
            Method: POST
      Tags:
        Name: !Sub "${Environment}-${ProjectName}-api-handler"

  ApiHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Environment}-${ProjectName}-api-handler"
      RetentionInDays: 30

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${Environment}-${ProjectName}-api-access"
      RetentionInDays: 30

Outputs:
  ApiEndpoint:
    Description: Browser-callable base URL — put this in ui/.env.production as VITE_API_URL.
    Value: !Sub "https://${ArbiterApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ApiEndpoint"
  ApiId:
    Value: !Ref ArbiterApi
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ApiId"
  ApiHandlerFunctionArn:
    Value: !GetAtt ApiHandlerFunction.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ApiHandlerLambdaArn"
  ChatFunctionUrl:
    Description: Direct Function URL for /chat (bypasses API Gateway 29s timeout; testing-only, AuthType=NONE).
    Value: !GetAtt ApiHandlerFunctionUrl.FunctionUrl
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ChatFunctionUrl"
  UIEnvHints:
    Description: Drop-in for ui/.env.production
    Value: !Sub
      - |
        VITE_API_URL=https://${ApiId}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
        VITE_CHAT_URL=${ChatUrl}
        VITE_COGNITO_USER_POOL_ID=${UserPoolId}
        VITE_COGNITO_CLIENT_ID=${UserPoolClientId}
        VITE_COGNITO_REGION=${AWS::Region}
      - ApiId: !Ref ArbiterApi
        ChatUrl: !GetAtt ApiHandlerFunctionUrl.FunctionUrl
        UserPoolId:
          Fn::ImportValue: !Sub "${Environment}-${ProjectName}-UserPoolId"
        UserPoolClientId:
          Fn::ImportValue: !Sub "${Environment}-${ProjectName}-UserPoolClientId"

AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ARBITER – Observability (DEMO trim): CloudWatch dashboard + 1 alarm + SNS
  email. Dropped: dedicated CloudTrail and its S3 bucket+policy (the
  account's default management-events trail still captures everything),
  EventBridge custom bus, X-Ray sampling rule, Logs resource policy, 2
  extra alarms. The single alarm watches api_handler 5XX errors so the
  demo operator gets paged on hard failures.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  ProjectName:
    Type: String
    Default: st21arbiter-poc
  AlarmEmail:
    Type: String
    Default: "sridhardevops441@gmail.com"
    Description: Email for CloudWatch alarm notifications.

Resources:
  # ──────────────────────────── SNS Topic + Subscription ───────
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${Environment}-${ProjectName}-alarms"
      DisplayName: !Sub "${Environment} ARBITER alarms"
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-alarms"

  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref AlarmEmail
      TopicArn: !Ref AlarmTopic

  # ──────────────────────────── Single CW Alarm ────────────────
  # If api_handler returns 5XX more than 5 times in 5 min → page.
  ApiHandler5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${Environment}-${ProjectName}-api-handler-5xx"
      AlarmDescription: api_handler Lambda returning unhandled errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Sub "${Environment}-${ProjectName}-api-handler"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # ──────────────────────────── CW Dashboard (1) ───────────────
  ArbiterDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${Environment}-${ProjectName}"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric", "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/ApiGateway", "Count",       "ApiName", "${Environment}-${ProjectName}-api"],
                  [".",              "4XXError",    ".",        "."],
                  [".",              "5XXError",    ".",        "."],
                  [".",              "Latency",     ".",        ".", { "stat": "p95" }]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${AWS::Region}", "title": "API Gateway"
              }
            },
            {
              "type": "metric", "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${Environment}-${ProjectName}-api-handler"],
                  [".",          "Errors",      ".",            "."],
                  [".",          "Duration",    ".",            ".", { "stat": "p95" }],
                  [".",          "Throttles",   ".",            "."]
                ],
                "view": "timeSeries", "stacked": false,
                "region": "${AWS::Region}", "title": "api_handler Lambda"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: CloudWatch dashboard URL.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${Environment}-${ProjectName}"
  AlarmTopicArn:
    Value: !Ref AlarmTopic
    Export:
      Name: !Sub "${Environment}-${ProjectName}-AlarmTopicArn"

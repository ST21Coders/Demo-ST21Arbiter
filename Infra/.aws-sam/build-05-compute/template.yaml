AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "ARBITER \u2013 Compute (DEMO trim): ECR repos for master + zscaler specialist\
  \ (the other 2 specialists' repos live in 09-agentcore.yaml). Plus the processing_pipeline\
  \ Lambda (S3 raw \u2192 text extract \u2192 KB sync). Dropped: ECR repos for unused\
  \ agents (doc-specialist, net-specialist, iam-specialist, conflict-reasoner, remediation-planner).\
  \ The agents/ directory only has 4 real agents \u2014 keep their repos and nothing\
  \ else. Single-AZ: VpcConfig uses one private subnet.\n"
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
    - dev
    - staging
    - prod
  ProjectName:
    Type: String
    Default: st21arbiter-poc
Globals:
  Function:
    Runtime: python3.13
    Timeout: 300
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        ENVIRONMENT:
          Ref: Environment
        PROJECT_NAME:
          Ref: ProjectName
    VpcConfig:
      SubnetIds:
      - Fn::ImportValue:
          Fn::Sub: ${Environment}-${ProjectName}-PrivateSubnet1Id
      SecurityGroupIds:
      - Fn::ImportValue:
          Fn::Sub: ${Environment}-${ProjectName}-LambdaSGId
Resources:
  MasterOrchestratorRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName:
        Fn::Sub: ${Environment}-${ProjectName}/master-orchestrator
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: KMS
        KmsKey:
          Fn::ImportValue:
            Fn::Sub: ${Environment}-${ProjectName}-DataAtRestKeyArn
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: "{\n  \"rules\": [\n    {\"rulePriority\":1,\"description\"\
          :\"Keep last 5 images\",\n     \"selection\":{\"tagStatus\":\"any\",\"countType\"\
          :\"imageCountMoreThan\",\"countNumber\":5},\n     \"action\":{\"type\":\"\
          expire\"}}\n  ]\n}\n"
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${Environment}-${ProjectName}-master-orchestrator
  ZscalerSpecialistRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName:
        Fn::Sub: ${Environment}-${ProjectName}/zscaler-specialist
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: KMS
        KmsKey:
          Fn::ImportValue:
            Fn::Sub: ${Environment}-${ProjectName}-DataAtRestKeyArn
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: "{\n  \"rules\": [\n    {\"rulePriority\":1,\"description\"\
          :\"Keep last 5 images\",\n     \"selection\":{\"tagStatus\":\"any\",\"countType\"\
          :\"imageCountMoreThan\",\"countNumber\":5},\n     \"action\":{\"type\":\"\
          expire\"}}\n  ]\n}\n"
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${Environment}-${ProjectName}-zscaler-specialist
  ProcessingPipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ${Environment}-${ProjectName}-processing-pipeline
      Handler: processing_pipeline.handler
      CodeUri: ProcessingPipelineFunction
      Role:
        Fn::ImportValue:
          Fn::Sub: ${Environment}-${ProjectName}-ProcessingPipelineRoleArn
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          RAW_BUCKET:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-RawBucketName
          PROCESSED_BUCKET:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-ProcessedBucketName
          S3_KMS_KEY_ARN:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-S3KeyArn
          REPORTS_PREFIX: File_Transfer_Reports/
          COGNITO_ISSUER_URL:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-CognitoIssuerURL
          ALLOWED_GROUPS: ciso,grc
      FunctionUrlConfig:
        AuthType: NONE
      Tags:
        Name:
          Fn::Sub: ${Environment}-${ProjectName}-processing-pipeline
    Metadata:
      SamResourceId: ProcessingPipelineFunction
  ProcessingPipelinePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: ProcessingPipelineFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:s3:::${Environment}-${ProjectName}-raw
      SourceAccount:
        Ref: AWS::AccountId
  ProcessingPipelineSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name:
        Fn::Sub: ${Environment}-${ProjectName}-processing-pipeline-schedule
      Description: Twice-daily raw -> processed file move (06:00 / 18:00 PST literal
        UTC-8)
      ScheduleExpression: cron(0 14,2 * * ? *)
      State: ENABLED
      Targets:
      - Arn:
          Fn::GetAtt:
          - ProcessingPipelineFunction
          - Arn
        Id: ProcessingPipelineTarget
  ProcessingPipelineSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: ProcessingPipelineFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn:
        Fn::GetAtt:
        - ProcessingPipelineSchedule
        - Arn
  ProcessingPipelineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${Environment}-${ProjectName}-processing-pipeline
      RetentionInDays: 30
Outputs:
  MasterOrchestratorRepoUri:
    Value:
      Fn::GetAtt:
      - MasterOrchestratorRepo
      - RepositoryUri
    Export:
      Name:
        Fn::Sub: ${Environment}-${ProjectName}-MasterOrchestratorRepoUri
  ZscalerSpecialistRepoUri:
    Value:
      Fn::GetAtt:
      - ZscalerSpecialistRepo
      - RepositoryUri
    Export:
      Name:
        Fn::Sub: ${Environment}-${ProjectName}-ZscalerSpecialistRepoUri
  ProcessingPipelineLambdaArn:
    Value:
      Fn::GetAtt:
      - ProcessingPipelineFunction
      - Arn
    Export:
      Name:
        Fn::Sub: ${Environment}-${ProjectName}-ProcessingPipelineLambdaArn
  ProcessingPipelineFunctionUrl:
    Description: Direct Function URL to trigger the file mover from a UI (AuthType=NONE;
      JWT decoded in code).
    Value:
      Fn::GetAtt:
      - ProcessingPipelineFunctionUrl
      - FunctionUrl
    Export:
      Name:
        Fn::Sub: ${Environment}-${ProjectName}-ProcessingPipelineFunctionUrl

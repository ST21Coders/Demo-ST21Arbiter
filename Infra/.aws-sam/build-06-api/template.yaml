AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "ARBITER \u2013 API Plane (DEMO trim): API Gateway REST + Cognito JWT\
  \ authorizer + api_handler Lambda. Routes match exactly what the React UI calls\
  \ in ui/src/hooks/useApi.js and ui/src/pages/MCPChat.jsx. Dropped: WAFv2 (Cognito\
  \ JWT remains the gate); rate-limit kept via API Gateway throttle settings. Wire-up:\
  \ browser \u2192 CloudFront \u2192 React SPA \u2192 fetch(API_URL + path, headers={Authorization:\
  \ Bearer <Cognito IdToken>}) \u2192 API Gateway (Cognito authorizer validates JWT)\
  \ \u2192 api_handler Lambda \u2192 AgentCore / DynamoDB / Bedrock.\n"
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
    - dev
    - staging
    - prod
  ProjectName:
    Type: String
    Default: st21arbiter-poc
  ThrottleRateLimit:
    Type: Number
    Default: 50
    Description: API Gateway requests per second (demo).
  ThrottleBurstLimit:
    Type: Number
    Default: 100
    Description: API Gateway burst capacity (demo).
  AllowedOrigin:
    Type: String
    Default: '*'
    Description: CORS Access-Control-Allow-Origin. For prod, set to the CloudFront
      domain.
  ChatFunctionUrlAllowedOrigins:
    Type: CommaDelimitedList
    Default: http://localhost:5173
    Description: "CORS allow-list for the /chat Lambda Function URL. Set to the Vite\
      \ dev origin\nplus the CloudFront SPA URL (e.g. \"http://localhost:5173,https://dxxxx.cloudfront.net\"\
      ).\nFunction URL CORS is not the same as API Gateway CORS \u2014 it has its\
      \ own allow-list.\n"
Globals:
  Function:
    Runtime: python3.13
    Tracing: Active
    Environment:
      Variables:
        ENVIRONMENT:
          Ref: Environment
        PROJECT_NAME:
          Ref: ProjectName
Resources:
  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: ${Environment}-${ProjectName}-apigw-cwlogs-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: apigateway.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Tags:
      - Key: Name
        Value:
          Fn::Sub: ${Environment}-${ProjectName}-apigw-cwlogs-role
  ApiGatewayAccountConfig:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn:
        Fn::GetAtt:
        - ApiGatewayCloudWatchRole
        - Arn
  ArbiterApi:
    Type: AWS::Serverless::Api
    DependsOn: ApiGatewayAccountConfig
    Properties:
      Name:
        Fn::Sub: ${Environment}-${ProjectName}-api
      StageName:
        Ref: Environment
      TracingEnabled: true
      Cors:
        AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'''
        AllowOrigin:
          Fn::Sub: '''${AllowedOrigin}'''
        MaxAge: '''600'''
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn:
              Fn::ImportValue:
                Fn::Sub: ${Environment}-${ProjectName}-UserPoolArn
            Identity:
              Header: Authorization
      EndpointConfiguration:
        Type: REGIONAL
      MethodSettings:
      - HttpMethod: '*'
        ResourcePath: /*
        ThrottlingRateLimit:
          Ref: ThrottleRateLimit
        ThrottlingBurstLimit:
          Ref: ThrottleBurstLimit
        LoggingLevel: INFO
        DataTraceEnabled: false
        MetricsEnabled: true
      AccessLogSetting:
        DestinationArn:
          Fn::GetAtt:
          - ApiAccessLogGroup
          - Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","user":"$context.authorizer.claims.email","time":"$context.requestTime","method":"$context.httpMethod","path":"$context.resourcePath","status":"$context.status","latency":"$context.integrationLatency"}'
      Tags:
        Name:
          Fn::Sub: ${Environment}-${ProjectName}-api
  Unauthorized4xxResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: UNAUTHORIZED
      RestApiId:
        Ref: ArbiterApi
      StatusCode: '401'
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'''
        gatewayresponse.header.Access-Control-Allow-Methods: '''GET,POST,PUT,DELETE,OPTIONS'''
  AccessDenied4xxResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: ACCESS_DENIED
      RestApiId:
        Ref: ArbiterApi
      StatusCode: '403'
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'''
        gatewayresponse.header.Access-Control-Allow-Methods: '''GET,POST,PUT,DELETE,OPTIONS'''
  Default4xxResponse:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: DEFAULT_4XX
      RestApiId:
        Ref: ArbiterApi
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'''
        gatewayresponse.header.Access-Control-Allow-Methods: '''GET,POST,PUT,DELETE,OPTIONS'''
  ApiHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ${Environment}-${ProjectName}-api-handler
      Handler: api_handler.handler
      CodeUri: ApiHandlerFunction
      Role:
        Fn::ImportValue:
          Fn::Sub: ${Environment}-${ProjectName}-ApiHandlerRoleArn
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          COGNITO_USER_POOL_ID:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-UserPoolId
          COGNITO_ISSUER_URL:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-CognitoIssuerURL
          CONFLICTS_TABLE:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-ConflictsTableName
          AUDIT_TABLE:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-AuditLogTableName
          SESSIONS_TABLE:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-SessionsTableName
          CHANGE_REQUESTS_TABLE:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-ChangeRequestsTableName
          CONFLICTS_TABLE_V2:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-ConflictsTableV2Name
          SCAN_RUNS_TABLE:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-ScanRunsTableName
          TOKEN_USAGE_TABLE:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-TokenUsageTableName
          MCP_ENDPOINTS: ''
          SCANNER_LAMBDA_NAME:
            Fn::Sub: ${Environment}-${ProjectName}-scanner
          ALLOWED_ORIGIN:
            Ref: AllowedOrigin
          MASTER_AGENT_RUNTIME_ARN: ''
          SHAREPOINT_RUNTIME_ARN: ''
          AWSCONFIG_RUNTIME_ARN: ''
          ZSCALER_RUNTIME_ARN: ''
          JIRA_RUNTIME_ARN: ''
          MEMORY_ID: ''
          RAW_BUCKET:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-RawBucketName
          PROCESSED_BUCKET:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-ProcessedBucketName
          S3_KMS_KEY_ARN:
            Fn::ImportValue:
              Fn::Sub: ${Environment}-${ProjectName}-S3KeyArn
      VpcConfig:
        SubnetIds:
        - Fn::ImportValue:
            Fn::Sub: ${Environment}-${ProjectName}-PrivateSubnet1Id
        SecurityGroupIds:
        - Fn::ImportValue:
            Fn::Sub: ${Environment}-${ProjectName}-LambdaSGId
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            Ref: ChatFunctionUrlAllowedOrigins
          AllowMethods:
          - POST
          - GET
          AllowHeaders:
          - content-type
          - authorization
          MaxAge: 3600
      Events:
        ScanPost:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /scan
            Method: POST
        FindingsList:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /findings
            Method: GET
        FindingDetail:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /findings/{conflict_id}
            Method: GET
        ActionsList:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /actions
            Method: GET
        ActionsCreate:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /actions
            Method: POST
        ActionsApprove:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /actions/{cr_id}/approve
            Method: POST
        ActionsReject:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /actions/{cr_id}/reject
            Method: POST
        ActionsExecute:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /actions/{cr_id}/execute
            Method: POST
        ActionsEscalate:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /actions/{cr_id}/escalate
            Method: POST
        AuditList:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /audit
            Method: GET
        ChatPost:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /chat
            Method: POST
        MyMcpChatPost:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /mymcp/chat
            Method: POST
        ConversationsList:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /conversations
            Method: GET
        ConversationDetail:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /conversations/{session_id}
            Method: GET
        ConversationDelete:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /conversations/{session_id}
            Method: DELETE
        ConversationMessages:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /conversations/{session_id}/messages
            Method: GET
        HealthCheck:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE
        DashboardAggregate:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /dashboard
            Method: GET
        ScanRunsList:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /scan-runs
            Method: GET
        ScanRunDetail:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /scan-runs/{scan_run_id}
            Method: GET
        McpHealth:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /mcp-health
            Method: GET
        AgentStatus:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /agent-status
            Method: GET
        JiraTicketCreate:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /jira/tickets
            Method: POST
        UploadsPresign:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /uploads/presign
            Method: POST
        UploadsList:
          Type: Api
          Properties:
            RestApiId:
              Ref: ArbiterApi
            Path: /uploads/list
            Method: GET
      Tags:
        Name:
          Fn::Sub: ${Environment}-${ProjectName}-api-handler
    Metadata:
      SamResourceId: ApiHandlerFunction
  ApiHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${Environment}-${ProjectName}-api-handler
      RetentionInDays: 30
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/apigateway/${Environment}-${ProjectName}-api-access
      RetentionInDays: 30
Outputs:
  ApiEndpoint:
    Description: "Browser-callable base URL \u2014 put this in ui/.env.production\
      \ as VITE_API_URL."
    Value:
      Fn::Sub: https://${ArbiterApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name:
        Fn::Sub: ${Environment}-${ProjectName}-ApiEndpoint
  ApiId:
    Value:
      Ref: ArbiterApi
    Export:
      Name:
        Fn::Sub: ${Environment}-${ProjectName}-ApiId
  ApiHandlerFunctionArn:
    Value:
      Fn::GetAtt:
      - ApiHandlerFunction
      - Arn
    Export:
      Name:
        Fn::Sub: ${Environment}-${ProjectName}-ApiHandlerLambdaArn
  ChatFunctionUrl:
    Description: Direct Function URL for /chat (bypasses API Gateway 29s timeout;
      testing-only, AuthType=NONE).
    Value:
      Fn::GetAtt:
      - ApiHandlerFunctionUrl
      - FunctionUrl
    Export:
      Name:
        Fn::Sub: ${Environment}-${ProjectName}-ChatFunctionUrl
  UIEnvHints:
    Description: Drop-in for ui/.env.production
    Value:
      Fn::Sub:
      - 'VITE_API_URL=https://${ApiId}.execute-api.${AWS::Region}.amazonaws.com/${Environment}

        VITE_CHAT_URL=${ChatUrl}

        VITE_COGNITO_USER_POOL_ID=${UserPoolId}

        VITE_COGNITO_CLIENT_ID=${UserPoolClientId}

        VITE_COGNITO_REGION=${AWS::Region}

        '
      - ApiId:
          Ref: ArbiterApi
        ChatUrl:
          Fn::GetAtt:
          - ApiHandlerFunctionUrl
          - FunctionUrl
        UserPoolId:
          Fn::ImportValue:
            Fn::Sub: ${Environment}-${ProjectName}-UserPoolId
        UserPoolClientId:
          Fn::ImportValue:
            Fn::Sub: ${Environment}-${ProjectName}-UserPoolClientId
